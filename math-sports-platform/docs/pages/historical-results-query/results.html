<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">

    <!-- 浏览器标签页上显示的标题 -->
    <title>历年成绩查询 - 数跃山大数学学院体育信息平台</title>

    <!-- 
    引入公共样式文件 style.css。
    当前 results.html 的位置是：
    src/pages/historical-results-query/results.html

    style.css 的位置是：
    src/css/style.css

    所以路径要先返回两层到 src：
    ../../
    再进入 css 文件夹：
    ../../css/style.css
  -->
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

    <!-- 页面顶部标题区域 -->
    <header class="header">
        <h1>历年成绩查询</h1>
        <p>校运会 · 院运会 · 田径项目成绩</p>
    </header>

    <!-- 页面主体内容 -->
    <main class="main">

        <!-- 查询说明模块 -->
        <section class="intro">
            <h2>查询说明</h2>
            <p>
                本页面用于查看山东大学数学学院历年校运会、院运会田径成绩。
                当前版本先通过 PDF 文件展示成绩材料，后续可以继续加入按年份、赛事、项目和姓名检索的功能。
            </p>
        </section>

        <!-- PDF 文件列表模块 -->
        <section class="features">
            <h2>成绩 PDF 文件</h2>

            <!-- 
    pdf-list 用来包住所有 PDF 链接。
    以后有多个 PDF，就继续往这里加。
  -->
            <div class="pdf-list">

                <!-- 
      a 标签表示链接。
      href 写 PDF 文件的位置。
      target="_blank" 表示点击后在新标签页打开 PDF。
    -->
                <a class="pdf-card" href="./pdf-files/山东大学数学学院田径运动队纪录表.pdf" target="_blank">
                    <h3>2021-2026 年数学学院田径队纪录</h3>
                    <p>点击查看山东大学数学学院田径运动队纪录表pdf。</p>
                </a>

                <a class="pdf-card" href="./pdf-files/2026年校运会数学学院各项目最佳成绩.pdf" target="_blank">
                    <h3>2026年校运会数学学院各项目最佳成绩</h3>
                    <p>点击查看2026年校运会数学学院各项目最佳成绩pdf。</p>
                </a>
            </div>

            <!-- 返回首页链接 -->
            <p class="back-link">
                <a href="../../index.html">返回首页</a>
            </p>
        </section>

    </main>

</body>

</html>
