<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">

    <!-- 浏览器标签页标题 -->
    <title>数跃山大 - 山东大学数学学院体育信息平台</title>

    <!-- 
      引入 CSS 样式文件。

      当前 index.html 在项目根目录：
      math-sports-platform/index.html

      style.css 在：
      math-sports-platform/css/style.css

      所以路径是：
      ./css/style.css
    -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <!-- 
      页面顶部标题区域。
      header 通常用来放网站标题、简介、导航等内容。
    -->
    <header class="header">
        <h1>数跃山大 - 山东大学数学学院体育信息平台</h1>
        <p>校运会 · 院运会 · 田径队训练</p>
    </header>

    <!-- 
      main 表示网页主体内容。
      一个页面通常只有一个 main。
    -->
    <main class="main">

        <!-- 平台简介模块 -->
        <section class="intro">
            <h2>平台简介</h2>

            <p>
                本平台面向山东大学数学学院学生，主要用于历年校运会、院运会田径成绩查询，
                院运会报名与项目编排，以及日常田径队训练签到。
            </p>
        </section>

        <!-- 功能入口模块 -->
        <section class="features">
            <h2>功能入口</h2>

            <!-- 
              feature-list 是功能卡片的外层容器。
              里面每一个 feature-card 都是一个功能入口。
            -->
            <div class="feature-list">

                <!-- 
                  历年成绩查询入口。
                  点击后跳转到：
                  pages/historical-results-query/results.html
                -->
                <a class="feature-card" href="./pages/historical-results-query/results.html">
                    <h3>历年成绩查询</h3>
                    <p>查询数院历年校运会、院运会田径成绩与田径队相关资料。</p>
                </a>

                <!-- 
                  院运会报名编排入口。
                  点击后先进入报名说明页；
                  在 registration.html 里再跳转到腾讯文档报名表。
                -->
                <a class="feature-card" href="./pages/sports-meeting-registration/registration.html">
                    <h3>院运会报名编排</h3>
                    <p>进入院运会报名说明页，并通过腾讯文档完成项目报名。</p>
                </a>

                <!-- 
                  训练签到入口。
                  当前阶段先作为功能占位页；
                  后续可以接入腾讯文档、问卷表或数据库签到系统。
                -->
                <a class="feature-card" href="./pages/training-checkin/checkin.html">
                    <h3>训练签到</h3>
                    <p>记录田径队日常训练出勤情况，后续支持签到与统计功能。</p>
                </a>

            </div>
        </section>

    </main>

</body>

</html>
